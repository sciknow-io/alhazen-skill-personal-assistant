view: collection
primary_type: collection
label: "Collection"
label_plural: "Collections"
url_path: /career/collection/[id]
nav_parent: hub
notes: >
  collection is a core schema type (not career-namespaced). This is a terminal
  view -- no outbound portals. Member papers are loaded via the containment
  relation (or equivalent). Notes per paper are fetched on-demand (lazy expand)
  via a separate API call -- not loaded with the initial page fetch.

browse:
  label_field: name
  subtitle_field: description
  status_field: null
  status_values: []
  sort_default: name
  filter_axis: null

detail:
  header:
    title_field: name
    subtitle_portal: null
    status_field: null
    priority_field: null
    external_url_field: null
  quick_info: []
  layout: full_width
  main_column:
    - kind: member_list
      name: "Papers"
      member_type: scilit-paper
      count_in_header: true
      lazy_notes: true
      notes_api_path: /api/career/notes/[member_id]
  side_column: []

portals: []
