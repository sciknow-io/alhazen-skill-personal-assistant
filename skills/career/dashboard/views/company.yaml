view: company
primary_type: career-company
label: "Company"
label_plural: "Companies"
url_path: /career/company/[id]
nav_parent: hub
notes: >
  NOT YET BUILT. Currently rendered only as a preview_card portal on position
  and opportunity pages. When built as a standalone page it should show all
  positions and opportunities at this company,
  and notes. A Companies tab in hub.yaml should be added when this page exists.

browse:
  label_field: name
  subtitle_field: location
  status_field: null
  status_values: []
  sort_default: name
  filter_axis: null

detail:
  header:
    title_field: name
    subtitle_portal: null
    status_field: null
    priority_field: null
    external_url_field: company-url
  quick_info:
    - {field: location,     label: "Location", icon: MapPin,       format: plain}
    - {field: linkedin-url, label: "LinkedIn", icon: ExternalLink, format: external_link}
  layout: two_column
  main_column:
    - kind: table
      name: "Positions"
      via_relation: career-position-at-company
      via_role: employer
      target_role: position
      target_type: career-position
      columns:
        - {field: name,               label: "Role",   format: plain}
        - {field: application-status, label: "Status", format: badge}
    - kind: table
      name: "Opportunities"
      via_relation: career-opportunity-at-organization
      via_role: organization
      target_role: opportunity
      target_type: career-opportunity
      columns:
        - {field: name,               label: "Name",   format: plain}
        - {field: opportunity-status, label: "Status", format: badge}
  side_column:
    - kind: notes_group
      via_relation: aboutness
      via_role: subject
      notes_include: []
      show_type_icons: true
      collapsible: true

portals: []
