name: interview_notes
description: Map jhunt-interview-note to career-interview-note
depends_on: []
idempotent: true
skolem_prefix: note
skolem_keys: [id]
datetime_attrs: [created-at, career-interview-date]
source_match: |
  match
    $s isa jhunt-interview-note;
  fetch {
    "id": $s.id,
    "content": $s.content,
    "name": $s.name,
    "created": $s.created-at,
    "interview_date": $s.jhunt-interview-date
  };
target_check: |
  match $x isa career-interview-note, has career-legacy-id $id; fetch { "id": $x.id };
target_insert: |
  insert
    $t isa career-interview-note,
      has id $skolem_id,
      has career-legacy-id $id,
      has content $content;
optional_attrs:
  name: name
  created: created-at
  interview_date: career-interview-date
