name: skill_gap_notes
description: Map jhunt-skill-gap-note to career-skill-gap-note
depends_on: []
idempotent: true
skolem_prefix: note
skolem_keys: [id]
datetime_attrs: [created-at]
source_match: |
  match
    $s isa jhunt-skill-gap-note;
  fetch {
    "id": $s.id,
    "content": $s.content,
    "name": $s.name,
    "created": $s.created-at
  };
target_check: |
  match $x isa career-skill-gap-note, has career-legacy-id $id; fetch { "id": $x.id };
target_insert: |
  insert
    $t isa career-skill-gap-note,
      has id $skolem_id,
      has career-legacy-id $id,
      has content $content;
optional_attrs:
  name: name
  created: created-at
