name: fit_analysis_notes
description: Map jhunt-fit-analysis-note to career-fit-analysis-note
depends_on: []
idempotent: true
skolem_prefix: note
skolem_keys: [id]
datetime_attrs: [created-at]
source_match: |
  match
    $s isa jhunt-fit-analysis-note;
  fetch {
    "id": $s.id,
    "content": $s.content,
    "name": $s.name,
    "created": $s.created-at,
    "fit_score": $s.jhunt-fit-score,
    "fit_summary": $s.jhunt-fit-summary
  };
target_check: |
  match $x isa career-fit-analysis-note, has career-legacy-id $id; fetch { "id": $x.id };
target_insert: |
  insert
    $t isa career-fit-analysis-note,
      has id $skolem_id,
      has career-legacy-id $id,
      has content $content;
optional_attrs:
  name: name
  created: created-at
  fit_score: career-fit-score
  fit_summary: career-fit-summary
