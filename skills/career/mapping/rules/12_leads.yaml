name: leads
description: Map jhunt-lead to career-lead
depends_on: []
idempotent: true
skolem_prefix: lead
skolem_keys: [id]
datetime_attrs: [created-at]
source_match: |
  match
    $s isa jhunt-lead;
  fetch {
    "id": $s.id,
    "name": $s.name,
    "description": $s.description,
    "status": $s.jhunt-opportunity-status,
    "priority": $s.jhunt-priority-level,
    "short_name": $s.jhunt-short-name,
    "created": $s.created-at
  };
target_check: |
  match $x isa career-lead, has career-legacy-id $id; fetch { "id": $x.id };
target_insert: |
  insert
    $t isa career-lead,
      has id $skolem_id,
      has career-legacy-id $id,
      has name $name;
optional_attrs:
  description: description
  status: career-opportunity-status
  priority: career-priority-level
  short_name: career-short-name
  created: created-at
