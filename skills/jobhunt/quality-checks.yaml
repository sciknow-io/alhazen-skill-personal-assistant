# Jobhunt Skill — Data Quality Checks
# ====================================
# Declarative audit rules executed by the generic audit runner.
# Each check defines a TypeQL query to find violations, a severity,
# and a root cause analysis with prevention fix.
#
# Run: uv run python .claude/skills/jobhunt/jobhunt.py audit
# Fix: uv run python .claude/skills/jobhunt/jobhunt.py audit --fix

skill: jobhunt
version: 1
repo: sciknow-io/alhazen-skill-examples

checks:
  # ── Data Quality ──────────────────────────────────────────────

  - name: position-company-link
    category: data-quality
    severity: high
    description: "Positions should be linked to a company via position-at-company"
    find_violations: |
      match $p isa jobhunt-position, has id $id, has name $n;
      not { (position: $p, employer: $c) isa position-at-company; };
      fetch { "id": $id, "name": $n };
    count_total: |
      match $p isa jobhunt-position, has id $id;
      fetch { "id": $id };
    fix_type: script
    fix_description: "Extract company name from position title/URL, match to existing company, create position-at-company relation"
    root_cause:
      component: script
      file: jobhunt.py
      function: cmd_add_position
      description: "add-position creates a company entity via --company flag but does NOT create a position-at-company relation linking them"
      prevention: "After inserting the company and position, insert (position: $p, employer: $c) isa position-at-company in the same transaction"
      test: "jobhunt.py add-position --title 'Test Role' --company 'TestCorp' then show-position should return company != null"

  - name: ugly-titles
    category: data-quality
    severity: medium
    description: "Position titles containing job-board boilerplate ('Job Application for', 'hiring', '| LinkedIn')"
    find_violations: |
      match $p isa jobhunt-position, has id $id, has name $n;
      { $n contains "Job Application for"; } or { $n contains "hiring"; } or { $n contains "| LinkedIn"; };
      fetch { "id": $id, "name": $n };
    count_total: |
      match $p isa jobhunt-position, has id $id;
      fetch { "id": $id };
    fix_type: script
    fix_description: "Strip boilerplate prefixes/suffixes: 'Job Application for X at Y' -> 'X', 'Y hiring Z' -> 'Z', remove '| LinkedIn'"
    root_cause:
      component: prompt
      file: SKILL.md
      description: "ingest-job uses raw scraped page title without cleaning. Job board pages have titles like 'Job Application for X at Y' or 'Company hiring X in Location | LinkedIn'"
      prevention: "Add title extraction step to ingest-job: strip 'Job Application for', company suffix after 'at', '| LinkedIn', 'hiring' prefix"
      test: "ingest-job from a LinkedIn URL should produce a clean role title without platform boilerplate"

  - name: missing-short-name
    category: data-quality
    severity: medium
    description: "Positions without a short-name for compact display"
    find_violations: |
      match $p isa jobhunt-position, has id $id, has name $n;
      not { $p has short-name $s; };
      fetch { "id": $id, "name": $n };
    count_total: |
      match $p isa jobhunt-position, has id $id;
      fetch { "id": $id };
    fix_type: script
    fix_description: "Auto-generate short-name from title: take first 3-4 significant words, append company abbreviation"
    root_cause:
      component: script
      file: jobhunt.py
      function: cmd_add_position
      description: "add-position does not auto-generate short-name when none is provided"
      prevention: "If --short-name not provided, auto-generate from title + company name"
      test: "jobhunt.py add-position --title 'Senior ML Engineer' --company 'Acme' without --short-name should auto-set short-name"

  - name: missing-salary
    category: data-quality
    severity: low
    description: "Positions without salary-range information"
    find_violations: |
      match $p isa jobhunt-position, has id $id, has name $n;
      not { $p has salary-range $s; };
      fetch { "id": $id, "name": $n };
    count_total: |
      match $p isa jobhunt-position, has id $id;
      fetch { "id": $id };
    fix_type: manual
    fix_description: "Salary info must be manually researched from job posting or Levels.fyi"
    root_cause:
      component: convention
      description: "Many job postings do not include salary. No convention for researching and recording salary separately"
      prevention: "Add salary research step to ingestion workflow in USAGE.md"

  - name: positions-without-notes
    category: data-quality
    severity: low
    description: "Positions with no notes (no analysis, no application tracking)"
    find_violations: |
      match $p isa jobhunt-position, has id $id, has name $n;
      not { (note: $note, subject: $p) isa aboutness; };
      fetch { "id": $id, "name": $n };
    count_total: |
      match $p isa jobhunt-position, has id $id;
      fetch { "id": $id };
    fix_type: manual
    fix_description: "Review each position and add at least an application-note or research-note"
    root_cause:
      component: convention
      description: "No convention requiring initial notes when adding a position"
      prevention: "Agent operating rules should require creating a research-note when adding any new position"

  # ── Duplicates ────────────────────────────────────────────────

  - name: duplicate-companies
    category: duplicate
    severity: high
    description: "Multiple company entities with identical names"
    find_violations: |
      match $c1 isa jobhunt-company, has id $id1, has name $n;
      $c2 isa jobhunt-company, has id $id2, has name $n;
      $id1 != $id2;
      fetch { "name": $n, "id1": $id1, "id2": $id2 };
    fix_type: script
    fix_description: "Merge duplicate companies: keep canonical (most relations), update all position-at-company and works-at relations to point to canonical, delete extras"
    root_cause:
      component: script
      file: jobhunt.py
      function: cmd_add_position
      description: "add-position --company 'X' creates a new company entity every time without checking if 'X' already exists"
      prevention: "Before creating a new company, query for existing company with matching name (case-insensitive). Reuse if found."
      test: "Running add-position --company 'Anthropic' when Anthropic already exists should NOT create a second entity"

  # ── Orphans ───────────────────────────────────────────────────

  - name: orphaned-companies
    category: data-quality
    severity: medium
    description: "Companies with no positions or opportunities linked"
    find_violations: |
      match $c isa jobhunt-company, has id $id, has name $n;
      not { (position: $p, employer: $c) isa position-at-company; };
      not { (opportunity: $o, organization: $c) isa opportunity-at-organization; };
      fetch { "id": $id, "name": $n };
    count_total: |
      match $c isa jobhunt-company, has id $id;
      fetch { "id": $id };
    fix_type: script
    fix_description: "For each orphaned company, try to match positions by company name in title. If no match possible, archive or delete."
    root_cause:
      component: script
      file: jobhunt.py
      function: cmd_add_position
      description: "Company created but position-at-company relation not created (same root cause as position-company-link)"
      prevention: "Same fix as position-company-link: auto-create relation in add-position"
