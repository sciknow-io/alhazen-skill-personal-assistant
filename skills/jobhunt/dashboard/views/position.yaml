view: position
primary_type: jobhunt-position
label: "Position"
label_plural: "Positions"
url_path: /jobhunt/position/[id]
nav_parent: hub

browse:
  label_field: name
  subtitle_field: short-name
  status_field: opportunity-status
  status_values:
    [researching, applied, phone-screen, interviewing, offer, rejected, withdrawn]
  sort_default: name
  filter_axis: opportunity-status

detail:
  header:
    title_field: name
    subtitle_portal: company
    status_field: opportunity-status
    priority_field: priority-level
    external_url_field: job-url
  quick_info:
    - {field: location,      label: "Location",      icon: MapPin,     format: plain}
    - {field: salary-range,  label: "Salary",        icon: DollarSign, format: plain}
    - {field: remote-policy, label: "Remote Policy", icon: Building2,  format: plain}
    - {field: fit-score,     label: "Fit Score",     icon: Target,     format: percent_double}
  layout: two_column
  main_column:
    - kind: special_panel
      name: "Fit Analysis"
      source_note_type: jobhunt-fit-analysis-note
      fields: [fit-score, fit-summary]
      show_content: true
    - kind: table
      name: "Requirements"
      via_relation: requirement-for
      via_role: position
      target_role: requirement
      target_type: jobhunt-requirement
      columns:
        - {field: skill-name,  label: "Skill",           format: plain}
        - {field: skill-level, label: "Required Level",  format: badge}
        - {field: your-level,  label: "Your Level",      format: gap_icon}
        - {field: content,     label: "Notes",           format: plain}
  side_column:
    - kind: notes_group
      via_relation: aboutness
      via_role: subject
      notes_exclude: [fit-analysis]
      show_type_icons: true
      collapsible: false
    - kind: artifact_detail
      name: "Job Description"
      artifact_type: jobhunt-job-description
      via_relation: aboutness
      collapsed_by_default: true
      content_format: pre

portals:
  - name: "Company"
    kind: preview_card
    via_relation: position-at-company
    via_role: position
    target_role: employer
    target_type: jobhunt-company
    preview_fields:
      - {field: name,        label: "Name",    format: plain}
      - {field: description, label: "About",   format: plain}
      - {field: company-url, label: "Website", format: external_link}
  - name: "Background Reading"
    kind: linked_list
    via_relation: jobhunt-background-reading
    via_role: opportunity
    target_role: reading-material
    target_type: collection
    target_view: collection
